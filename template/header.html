<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>punff</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Caveat:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  background:#fcf9f0;
  font-family:'IBM Plex Mono',monospace;
  color:#1c1c17;
}

body{
  padding:3rem 1.5rem 6rem;
  max-width:480px;
  margin:0 auto;
}

/* ── sig ── */
.sig{
  font-size:10px;
  color:#888;
  letter-spacing:0.08em;
  margin-bottom:4rem;
}

/* ── card base ── */
.card{
  position:relative;
  background:#fcf9f0;
  padding:1.2rem 1.2rem 2rem;
  margin-bottom:2.5rem;
}

.card svg.b{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  overflow:visible;
}

/* rotation variants */
.r1{transform:rotate(-0.8deg);}
.r2{transform:rotate(1.2deg);}
.r3{transform:rotate(-1.5deg);}
.r4{transform:rotate(2.1deg);}
.r5{transform:rotate(-0.4deg);}
.r6{transform:rotate(1.8deg);}

/* card surface variants */
.card.filled{background:#f0ede4;}
.card.dark{background:#1c1c17;color:#fcf9f0;}
.card.dark .date{color:rgba(252,249,240,0.35);}

/* ── date ── */
.date{
  position:absolute;
  bottom:9px;right:11px;
  font-size:9px;
  color:#bbb;
  letter-spacing:0.04em;
}

/* ── month card ── */
.card.month-card{
  padding:1rem 1.2rem 1.4rem;
  margin-bottom:1rem;
}
.month-label{
  font-family:'Caveat',cursive;
  font-size:38px;
  font-weight:700;
  color:#1c1c17;
  line-height:1;
}
.month-year{
  font-family:'Caveat',cursive;
  font-size:22px;
  font-weight:400;
  color:#aaa;
  display:block;
  margin-top:2px;
}

/* ── text ── */
.text-body{font-size:13px;line-height:1.85;color:#1c1c17;}
.text-body.i{font-style:italic;}

/* ── music ── */
.track{
  display:flex;
  gap:10px;
  padding:5px 0;
  border-bottom:1px solid #e0ddd4;
  font-size:11px;
  line-height:1.5;
}
.track:last-child{border-bottom:none;}
.track-artist{color:#aaa;min-width:70px;font-size:9px;padding-top:2px;flex-shrink:0;}

/* ── audio ── */
.audio-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:6px 0;
  border-bottom:1px solid #e0ddd4;
}
.audio-row:last-child{border-bottom:none;}
.play-btn{
  width:22px;height:22px;
  background:#1c1c17;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;
}
.play-btn:active{transform:translate(1px,1px);}
.tri{
  width:0;height:0;
  border-top:5px solid transparent;
  border-bottom:5px solid transparent;
  border-left:8px solid #fcf9f0;
  margin-left:2px;
}
.audio-title{font-size:10px;flex:1;color:#1c1c17;}
.audio-dur{font-size:9px;color:#bbb;}
.waveform{display:flex;align-items:center;gap:1.5px;margin-top:8px;height:18px;}
.wb{background:#ddd;width:2px;flex-shrink:0;}

/* ── photos ── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.ph{background:#e8e4da;overflow:hidden;}
.ph.sq{aspect-ratio:1;}
.ph.tall{grid-row:span 2;aspect-ratio:unset;}
.ph img{width:100%;height:100%;object-fit:cover;filter:grayscale(20%) contrast(105%);}
.ph-full{width:100%;height:220px;background:#e8e4da;overflow:hidden;}
.ph-full img{width:100%;height:100%;object-fit:cover;filter:grayscale(20%) contrast(105%);}

/* ── links ── */
.link-row{
  display:block;
  font-size:11px;
  color:#1c1c17;
  text-decoration:none;
  padding:5px 0;
  border-bottom:1px solid #e0ddd4;
  line-height:1.6;
}
.link-row:last-child{border-bottom:none;}
.link-src{font-size:9px;color:#bbb;display:block;}

/* ── films ── */
.film-row{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  font-size:11px;
  padding:5px 0;
  border-bottom:1px solid #e0ddd4;
}
.film-row:last-child{border-bottom:none;}
.film-row.seen{color:#ccc;text-decoration:line-through;}
.film-year{font-size:9px;color:#bbb;}

/* ── travel ── */
.route{font-size:22px;font-weight:500;letter-spacing:0.01em;line-height:1.2;}
.route-arrow{color:#ccc;margin:0 4px;font-weight:300;}
.route-meta{font-size:10px;color:#888;margin-top:6px;line-height:1.8;}

/* ── gear ── */
.gear-name{font-size:14px;font-weight:500;margin-bottom:5px;}
.gear-note{font-size:10px;color:#666;line-height:1.75;}

/* ── recipe ── */
.recipe-name{font-size:14px;font-weight:500;margin-bottom:10px;}
.recipe-row{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  padding:4px 0;
  border-bottom:1px solid #e0ddd4;
}
.recipe-row:last-child{border-bottom:none;}
.recipe-amt{font-size:9px;color:#aaa;}

/* ── video ── */
.yt-box{
  width:100%;height:120px;
  background:#1c1c17;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.yt-box:active{opacity:0.85;}
.yt-tri{
  width:0;height:0;
  border-top:13px solid transparent;
  border-bottom:13px solid transparent;
  border-left:21px solid #fcf9f0;
  margin-left:4px;
}
.yt-title{font-size:10px;color:#888;margin-top:8px;line-height:1.5;}

/* ── event ── */
.event-name{font-size:15px;font-weight:500;line-height:1.3;margin-bottom:6px;}
.event-meta{font-size:10px;color:#888;line-height:1.9;}

/* ── map ── */
.map-ph{width:100%;height:110px;background:#dddad1;position:relative;overflow:hidden;}
.map-pin{position:absolute;top:45%;left:52%;width:7px;height:7px;background:#1c1c17;border-radius:50%;}
.map-label{position:absolute;bottom:7px;left:8px;font-size:9px;color:#555;letter-spacing:0.06em;}

/* ── suggest ── */
.suggest{font-size:9px;color:#bbb;margin-top:10px;}

/* ── mobile ── */
@media(max-width:520px){
  body{padding:2rem 1rem 5rem;}
  .card{transform:none!important;}
  .card:nth-child(odd){transform:rotate(-0.4deg)!important;}
  .card:nth-child(even){transform:rotate(0.4deg)!important;}
  .month-label{font-size:30px;}
}
</style>
</head>
<body>
<div class="sig">punff.port0.org</div>
