<script>
document.querySelectorAll('.play-btn').forEach(function(btn) {
  var audio = null;
  btn.addEventListener('click', function() {
    var file = btn.dataset.file;
    if (!file) return;
    if (audio && !audio.paused) {
      audio.pause();
      btn.querySelector('.tri').style.borderLeft = '8px solid #fcf9f0';
      return;
    }
    document.querySelectorAll('audio').forEach(function(a){ a.pause(); });
    document.querySelectorAll('.tri').forEach(function(t){ t.style.borderLeft = '8px solid #fcf9f0'; });
    audio = new Audio('/assets/audio/' + file);
    audio.play();
    btn.querySelector('.tri').style.borderLeft = '8px solid #888';
    audio.onended = function() {
      btn.querySelector('.tri').style.borderLeft = '8px solid #fcf9f0';
    };
  });
});
</script>
</body>
</html>
