<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>punff</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Caveat:wght@400;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  background:#f0ede4;
  font-family:'IBM Plex Mono',monospace;
  color:#111;
}

body{
  padding:2.5rem 1.5rem 6rem;
  max-width:900px;
  margin:0 auto;
}

.sig{
  font-size:10px;
  color:#666;
  letter-spacing:0.1em;
  margin-bottom:2.5rem;
}

.sig a{
  color:#666;
  text-decoration:none;
}

.month-section{
  margin-bottom:1.5rem;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:0;
  align-items:start;
}

.card{
  padding:0.9rem 1rem 1.8rem;
  margin:7px;
  position:relative;
  background:transparent;
  min-width:0;
}

.card.wide{
  grid-column:span 2;
}

.card.month-card{
  padding:1.2rem 1rem 1.4rem;
}

.card svg.border{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
}

.type-tag{
  font-size:8px;
  letter-spacing:0.18em;
  color:#888;
  text-transform:uppercase;
  display:block;
  margin-bottom:9px;
}

.date-tag{
  font-size:8px;
  color:#aaa;
  position:absolute;
  bottom:8px;right:10px;
  letter-spacing:0.04em;
}

/* month card */
.month-text{
  font-family:'Caveat',cursive;
  font-size:42px;
  font-weight:700;
  color:#111;
  line-height:1.1;
}
.month-year{
  font-family:'Caveat',cursive;
  font-size:24px;
  font-weight:400;
  color:#888;
  display:block;
}

/* text */
.text-content{font-size:11.5px;line-height:1.85;color:#111;}
.text-content.i{font-style:italic;}

/* lists */
.li{
  font-size:11px;
  padding:4px 0;
  border-bottom:1px solid #ccc;
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  line-height:1.5;
}
.li:last-child{border-bottom:none;}
.li.done{color:#bbb;text-decoration:line-through;}
.li span{color:#bbb;font-size:9px;}

/* music */
.track-line{
  font-size:11px;
  padding:4px 0;
  border-bottom:1px solid #ccc;
  display:flex;
  gap:8px;
}
.track-line:last-child{border-bottom:none;}
.track-artist{color:#888;min-width:65px;font-size:9px;padding-top:1px;}

/* links */
.link-item{
  display:block;
  font-size:11px;
  color:#111;
  text-decoration:none;
  padding:4px 0;
  border-bottom:1px solid #ccc;
}
.link-item:last-child{border-bottom:none;}
.link-src{font-size:9px;color:#aaa;}

/* travel */
.travel-route{font-size:19px;font-weight:500;letter-spacing:0.01em;line-height:1.3;}
.travel-arrow{color:#aaa;margin:0 3px;font-weight:400;}
.travel-meta{font-size:10px;color:#888;margin-top:5px;line-height:1.8;}

/* photos */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.ph{
  position:relative;
  background:#e4e0d6;
  overflow:hidden;
}
.ph.sq{aspect-ratio:1;}
.ph.tall{grid-row:span 2;}
.ph.full{width:100%;height:200px;}
.ph svg{position:absolute;top:0;left:0;width:100%;height:100%;}

/* audio */
.audio-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:5px 0;
  border-bottom:1px solid #ccc;
}
.audio-row:last-child{border-bottom:none;}
.audio-play{
  width:15px;height:15px;
  border:1.5px solid #111;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  cursor:pointer;
}
.audio-tri{
  width:0;height:0;
  border-top:3.5px solid transparent;
  border-bottom:3.5px solid transparent;
  border-left:6px solid #111;
  margin-left:2px;
}
.audio-title{font-size:10px;flex:1;color:#111;}
.audio-dur{font-size:9px;color:#aaa;}

/* gear */
.gear-name{font-size:13px;font-weight:500;margin-bottom:4px;}
.gear-note{font-size:10px;color:#666;line-height:1.7;}

/* recipe */
.recipe-row{
  font-size:11px;
  padding:4px 0;
  border-bottom:1px solid #ccc;
  display:flex;
  justify-content:space-between;
}
.recipe-row:last-child{border-bottom:none;}
.recipe-amt{color:#888;font-size:10px;}

/* video */
.yt-thumb{
  width:100%;height:110px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
}
.yt-play{
  width:0;height:0;
  border-top:12px solid transparent;
  border-bottom:12px solid transparent;
  border-left:20px solid #f0ede4;
  margin-left:3px;
}
.yt-title{font-size:10px;color:#888;margin-top:7px;line-height:1.5;}

/* event */
.event-name{font-size:15px;font-weight:500;line-height:1.3;margin-bottom:6px;}
.event-meta{font-size:10px;color:#888;line-height:1.9;}

/* map */
.map-ph{width:100%;height:100px;background:#d4d0c8;position:relative;}
.map-pin{position:absolute;top:45%;left:52%;width:7px;height:7px;background:#111;border-radius:50%;}
.map-label{position:absolute;bottom:7px;left:8px;font-size:9px;color:#444;letter-spacing:0.06em;}

/* responsive */
@media(max-width:700px){
  .grid{grid-template-columns:1fr 1fr;}
  .card.wide{grid-column:span 2;}
  .month-text{font-size:32px;}
}
@media(max-width:420px){
  .grid{grid-template-columns:1fr;}
  .card.wide{grid-column:span 1;}
  .card{transform:none!important;}
  .card:nth-child(odd){transform:rotate(-0.4deg)!important;}
  .card:nth-child(even){transform:rotate(0.4deg)!important;}
}
</style>
</head>
<body>
<div class="sig">
  <span>punff.port0.org</span>
</div>
